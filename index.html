<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Tier List Maker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .tier-container {
            margin-bottom: 30px;
        }

        .tier-row {
            display: flex;
            margin-bottom: 10px;
            min-height: 100px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .tier-label {
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tier-s { background: linear-gradient(135deg, #ff6b6b, #ee5a6f); }
        .tier-a { background: linear-gradient(135deg, #ffa500, #ff8c00); }
        .tier-b { background: linear-gradient(135deg, #ffd700, #ffb700); }
        .tier-c { background: linear-gradient(135deg, #90ee90, #32cd32); }
        .tier-d { background: linear-gradient(135deg, #87ceeb, #4682b4); }
        .tier-f { background: linear-gradient(135deg, #9370db, #8a2be2); }

        .tier-items {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            align-content: flex-start;
        }

        .item-pool {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .item-pool h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .pool-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item {
            padding: 10px 15px;
            background: white;
            border: 2px solid #333;
            border-radius: 6px;
            cursor: move;
            user-select: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .item.dragging {
            opacity: 0.5;
        }

        .tier-items.drag-over {
            background: #e3f2fd;
            border: 2px dashed #2196f3;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ee5a6f;
            transform: translateY(-2px);
        }

        .btn-download {
            background: #4caf50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .tier-label {
                width: 60px;
                font-size: 1.5em;
            }

            h1 {
                font-size: 1.8em;
            }

            .item {
                font-size: 14px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Minecraft Tier List Maker</h1>
        <p class="subtitle">Drag and drop items to create your tier list!</p>

        <div class="tier-container">
            <div class="tier-row">
                <div class="tier-label tier-s">S</div>
                <div class="tier-items" data-tier="S"></div>
            </div>

            <div class="tier-row">
                <div class="tier-label tier-a">A</div>
                <div class="tier-items" data-tier="A"></div>
            </div>

            <div class="tier-row">
                <div class="tier-label tier-b">B</div>
                <div class="tier-items" data-tier="B"></div>
            </div>

            <div class="tier-row">
                <div class="tier-label tier-c">C</div>
                <div class="tier-items" data-tier="C"></div>
            </div>

            <div class="tier-row">
                <div class="tier-label tier-d">D</div>
                <div class="tier-items" data-tier="D"></div>
            </div>

            <div class="tier-row">
                <div class="tier-label tier-f">F</div>
                <div class="tier-items" data-tier="F"></div>
            </div>
        </div>

        <div class="item-pool">
            <h2>📦 Available Items</h2>
            <div class="pool-items" id="itemPool">
                <!-- Items will be added here by JavaScript -->
            </div>
        </div>

        <div class="buttons">
            <button class="btn-reset" onclick="resetTierList()">🔄 Reset</button>
            <button class="btn-download" onclick="downloadImage()">📥 Download</button>
        </div>
    </div>

    <script>
        // Minecraft items
        const minecraftItems = [
            '🐺 Dog/Wolf', '🗿 Iron Golem', '🐴 Horse', '👨‍🌾 Villager',
            '🐱 Cat', '🐝 Bee', '🦎 Axolotl', '🦎 Strider',
            '🐄 Cow', '🐔 Chicken', '🐷 Pig', '🐑 Sheep',
            '🦑 Squid', '🦇 Bat', '🐰 Rabbit', '🐢 Turtle',
            '👻 Phantom', '🐛 Silverfish', '🐜 Endermite',
            '💥 Creeper', '🧟 Baby Zombie', '🕷️ Spider',
            '⚔️ Diamond Sword', '⛏️ Diamond Pickaxe', '🪓 Diamond Axe',
            '🛡️ Shield', '🏹 Bow', '🎣 Fishing Rod',
            '🍎 Golden Apple', '🍞 Bread', '🥩 Steak',
            '💎 Diamond', '⛏️ Netherite', '🪙 Gold',
            '🌳 Oak Wood', '🪨 Stone', '🧱 Brick',
            '🔥 Lava', '💧 Water', '⚡ Lightning'
        ];

        // Initialize items in pool
        function initializeItems() {
            const pool = document.getElementById('itemPool');
            minecraftItems.forEach(item => {
                const itemDiv = createItemElement(item);
                pool.appendChild(itemDiv);
            });
        }

        // Create item element
        function createItemElement(text) {
            const div = document.createElement('div');
            div.className = 'item';
            div.draggable = true;
            div.textContent = text;
            div.addEventListener('dragstart', handleDragStart);
            div.addEventListener('dragend', handleDragEnd);
            return div;
        }

        // Drag handlers
        let draggedElement = null;

        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
        }

        // Setup drop zones
        function setupDropZones() {
            const dropZones = document.querySelectorAll('.tier-items, .pool-items');
            
            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    if (draggedElement) {
                        zone.appendChild(draggedElement);
                    }
                });
            });
        }

        // Reset tier list
        function resetTierList() {
            const pool = document.getElementById('itemPool');
            const allItems = document.querySelectorAll('.item');
            
            allItems.forEach(item => {
                pool.appendChild(item);
            });
        }

        // Download as image (simple version - alerts user)
        function downloadImage() {
            alert('To download: Take a screenshot of your tier list!\n\nWindows: Win + Shift + S\nMac: Cmd + Shift + 4');
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initializeItems();
            setupDropZones();
        });
    </script>
</body>
</html>
